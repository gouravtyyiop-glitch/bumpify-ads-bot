<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bumpify — Account Panel</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-inner">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <div class="header-text">
        <div class="logo-name">Bumpify</div>
        <div class="logo-sub">Account Manager</div>
      </div>
    </div>
  </header>

  <div id="main-screen" class="screen active">
    <div class="section-label">Connected Accounts</div>
    <div id="accounts-list" class="accounts-list">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
    <button class="btn btn-primary full-width" onclick="showAddScreen()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Account
    </button>
  </div>

  <div id="add-screen" class="screen">
    <div class="nav-back" onclick="showMainScreen()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </div>

    <div class="form-card">
      <div class="form-title">Add Telegram Account</div>

      <div id="step-phone" class="step active">
        <div class="field-group">
          <label class="field-label">Country Code</label>
          <select id="country-select" class="input-field" onchange="updatePrefix()">
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Phone Number</label>
          <div class="phone-row">
            <div class="prefix-box" id="prefix-display">+1</div>
            <input type="tel" id="phone-input" class="input-field phone-field" placeholder="9876543210" inputmode="tel" autocomplete="tel">
          </div>
          <div class="field-hint">Enter number without country code</div>
        </div>
        <button class="btn btn-primary full-width" onclick="sendOtp()">
          Send OTP
        </button>
      </div>

      <div id="step-otp" class="step">
        <div class="field-group">
          <label class="field-label">Verification Code</label>
          <input type="text" id="otp-input" class="input-field otp-field" placeholder="12345" maxlength="6" inputmode="numeric">
          <div class="field-hint">Code sent to your phone via Telegram</div>
        </div>
        <div id="step-2fa" style="display:none;" class="field-group">
          <label class="field-label">2-Step Verification Password</label>
          <input type="password" id="password-input" class="input-field" placeholder="Your 2FA password" autocomplete="current-password">
        </div>
        <button class="btn btn-primary full-width" onclick="verifyOtp()">Verify & Connect</button>
        <button class="btn btn-ghost full-width" onclick="goBackToPhone()">Change Number</button>
      </div>
    </div>
  </div>

  <div id="success-screen" class="screen">
    <div class="success-card">
      <div class="success-avatar" id="success-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="success-check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="success-name" id="success-name"></div>
      <div class="success-meta" id="success-meta"></div>
      <div class="success-note">Account connected. Display name updated with -Bumpify suffix.</div>
      <button class="btn btn-primary full-width" onclick="showMainScreen()">View Accounts</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <div id="loader" class="loader-overlay" style="display:none;">
    <div class="spinner"></div>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
